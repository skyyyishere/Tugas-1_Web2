<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Daftar Produk</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="flex-grow max-w-7xl mx-auto px-6 py-10">

    <h1 th:text="${title}">Judul</h1>

    <!-- Search Form -->
    <form th:action="@{/products/search}" method="get"
          class="mb-8 flex gap-3 max-w-md">
        <input type="text" name="keyword"
               placeholder="Cari produk..."
               th:value="${keyword}"
               class="flex-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-green-500">
        <button type="submit"
                class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition">
            Cari
        </button>
    </form>

    <!-- Category Filter Badges -->
    <div class="mb-6 flex items-center gap-3 flex-wrap">
        <span class="font-semibold text-gray-700">Filter:</span>
        <a th:href="@{/products}"
           class="px-4 py-1 bg-gray-200 rounded-full text-sm hover:bg-gray-300 transition">
            Semua
        </a>
        <a th:href="@{/products/category/Elektronik}"
           class="px-4 py-1 bg-indigo-500 text-white rounded-full text-sm hover:bg-indigo-600 transition">
            Elektronik
        </a>
        <a th:href="@{/products/category/Buku}"
           class="px-4 py-1 bg-green-500 text-white rounded-full text-sm hover:bg-green-600 transition">
            Buku
        </a>
        <a th:href="@{/products/category/Makanan}"
           class="px-4 py-1 bg-yellow-400 text-gray-900 rounded-full text-sm hover:bg-yellow-500 transition">
            Makanan
        </a>
    </div>

    <p class="text-muted">
        Menampilkan <strong th:text="${totalProducts}">0</strong> produk
    </p>

    <!-- Tabel Produk -->
    <div th:if="${!products.isEmpty()}"
         class="grid md:grid-cols-3 gap-6">

        <div th:each="product : ${products}"
             class="bg-white rounded-xl shadow-md p-6 hover:shadow-xl transition">

            <h2 class="text-xl font-semibold text-green-600"
                th:text="${product.name}">Nama</h2>

            <p class="text-sm text-gray-500 mb-2"
               th:text="${product.category}">Kategori</p>

            <p class="text-lg font-bold text-gray-800 mb-2"
               th:text="'Rp ' + ${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')}">
            </p>

            <p>
                Stok:
                <span th:text="${product.stock}"
                      th:classappend="${product.stock < 20}
                  ? 'text-red-600 font-bold'
                  : 'text-green-600 font-semibold'">
            </span>
            </p>

            <a th:href="@{/products/{id}(id=${product.id})}"
               class="inline-block mt-4 bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition">
                Detail
            </a>
        </div>
    </div>

    <!-- Pesan kosong -->
    <div th:if="${products.isEmpty()}" class="alert alert-warning">
        Tidak ada produk yang ditemukan.
    </div>

</div>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
