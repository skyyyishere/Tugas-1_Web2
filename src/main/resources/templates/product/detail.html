<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Detail Produk</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="flex-grow max-w-3xl mx-auto px-6 py-10">

    <!-- Produk ditemukan -->
    <div th:if="${product != null}"
         class="bg-white shadow-xl rounded-2xl p-8">

        <!-- Breadcrumb Tailwind -->
        <div class="text-sm text-gray-500 mb-4">
            <a th:href="@{/}" class="hover:text-green-600">Home</a>
            <span class="mx-2">/</span>
            <a th:href="@{/products}" class="hover:text-green-600">Produk</a>
            <span class="mx-2">/</span>
            <span th:text="${product.name}" class="text-gray-700"></span>
        </div>

        <!-- Judul -->
        <h1 class="text-3xl font-bold text-green-600 mb-6"
            th:text="${product.name}">Nama Produk</h1>

        <!-- Detail Info -->
        <div class="space-y-4 text-gray-700">

            <p>
                <span class="font-semibold">ID:</span>
                <span th:text="${product.id}"></span>
            </p>

            <p>
                <span class="font-semibold">Kategori:</span>
                <a th:href="@{/products/category/{cat}(cat=${product.category})}"
                   th:text="${product.category}"
                   class="text-green-600 hover:underline"></a>
            </p>

            <p>
                <span class="font-semibold">Harga:</span>
                <span th:text="'Rp ' + ${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')}"></span>
            </p>

            <p>
                <span class="font-semibold">Stok:</span>
                <span th:text="${product.stock}"
                      th:classappend="${product.stock < 20}
                  ? 'text-red-600 font-bold'
                  : 'text-green-600 font-semibold'">
            </span>

                <span th:if="${product.stock < 20}"
                      class="ml-2 text-xs bg-red-100 text-red-700 px-2 py-1 rounded-full">
                Stok Menipis!
            </span>

                <span th:if="${product.stock >= 20}"
                      class="ml-2 text-xs bg-green-100 text-green-700 px-2 py-1 rounded-full">
                Tersedia
            </span>
            </p>

        </div>

        <!-- Tombol kembali -->
        <a th:href="@{/products}"
           class="inline-block mt-6 bg-gray-800 text-white px-5 py-2 rounded-lg hover:bg-black transition">
            Kembali ke Daftar
        </a>

    </div>

    <!-- Produk tidak ditemukan -->
    <div th:if="${product == null}">
        <div class="bg-red-100 text-red-700 p-6 rounded-lg shadow">
            <h4>Produk Tidak Ditemukan</h4>
            <p th:text="${error}">Error message</p>
        </div>
    </div>

    <div class="mt-3">

    </div>

</div>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
