<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Greeting</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-green-200 via-green-400 to-green-700 min-h-screen flex flex-col">
<div class="flex-grow flex items-center justify-center px-6">
    <div class="bg-white shadow-2xl rounded-2xl p-10 text-center max-w-md">
        <h1 class="text-4xl font-bold text-green-600 mb-6"
            th:text="${greeting}">
            Greeting
        </h1>

        <a th:href="@{/}"
           class="inline-block bg-green-600 text-white px-6 py-3 rounded-lg hover:bg-green-700 hover:scale-105 transition duration-300">
            Kembali ke Home
        </a>
    </div>
</div>
</body>
</html>
