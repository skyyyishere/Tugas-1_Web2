<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white min-h-screen flex flex-col">

<!-- Pakai fragment navbar -->
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="relative flex-grow flex items-center justify-center overflow-hidden">

    <!-- Background Slides -->
    <div class="absolute inset-0 z-0">
        <div id="slide1" class="absolute inset-0 bg-cover bg-center transition-opacity duration-30 opacity-100"
             style="background-image: url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee');">
        </div>

        <div id="slide2" class="absolute inset-0 bg-cover bg-center transition-opacity duration-30 opacity-0"
             style="background-image: url('https://images.unsplash.com/photo-1492724441997-5dc865305da7');">
        </div>

        <div id="slide3" class="absolute inset-0 bg-cover bg-center transition-opacity duration-30 opacity-0"
             style="background-image: url('https://images.unsplash.com/photo-1501785888041-af3ef285b470');">
        </div>

        <!-- Blur Overlay -->
        <div class="absolute inset-0 backdrop-blur-md bg-white/40"></div>
    </div>

    <!-- Foreground Content -->
    <div class="relative z-10 text-center bg-white/70 p-12 rounded-3xl shadow-2xl max-w-2xl">

        <h1 class="text-4xl font-bold text-green-800 mb-4"
            th:text="${title}">
            Title
        </h1>

        <p class="text-gray-700 text-lg mb-6"
           th:text="${description}">
            Description
        </p>

        <div class="space-x-4">
            <a th:href="@{/products}"
               class="bg-green-700 text-white px-6 py-3 rounded-lg shadow hover:bg-green-800 transition">
                Semua Produk
            </a>

            <a th:href="@{/products/category/Elektronik}"
               class="border border-green-700 text-green-800 px-6 py-3 rounded-lg hover:bg-green-100 transition">
                Elektronik
            </a>
        </div>

    </div>

</div>

<!-- Pakai fragment footer -->
<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
